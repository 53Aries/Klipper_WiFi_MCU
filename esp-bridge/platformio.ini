; ─────────────────────────────────────────────────────────────────────────────
; esp-bridge — MCU-side ESP32-C5 firmware
; STM32 ← UART → XIAO ESP32-C5 ← WiFi 6 (802.11ax) → Pi host (Klipper socket://)
;
; PlatformIO replaces the ESP-IDF VS Code extension for this project.
;   Build   : Ctrl+Alt+B  (PlatformIO: Build)
;   Flash   : Ctrl+Alt+U  (PlatformIO: Upload)
;   Monitor : PlatformIO: Monitor (115200 baud, matches ESP_LOG output)
;
; The existing main/ directory layout is preserved — no files need to move.
; main/CMakeLists.txt (idf_component_register) is used directly by PlatformIO.
; ─────────────────────────────────────────────────────────────────────────────

[platformio]
default_envs = esp32c5-bridge
src_dir       = main

; ──────────────────────────────────────────────────────────────────────────────
; Primary environment — Seeed Studio XIAO ESP32-C5
; ──────────────────────────────────────────────────────────────────────────────
[env:esp32c5-bridge]
platform  = espressif32
board     = seeed_xiao_esp32c5
framework = espidf

; main/CMakeLists.txt defines idf_component_register() — PlatformIO uses
; src_dir = main (set in [platformio]) to locate it directly.

; sdkconfig
; Key settings it provides:
;   CONFIG_ESP_WIFI_STA_DISCONNECTED_PM_ENABLE=n  -> WIFI_PS_NONE equivalent
;   CONFIG_FREERTOS_HZ=1000                        -> 1ms tick resolution
;   CONFIG_ESP_TASK_WDT_EN=y                       -> hardware watchdog
board_build.sdkconfig_defaults = sdkconfig.defaults

; Serial monitor baud — matches ESP_LOG output rate
monitor_speed = 115200

; Uncomment and set your COM port for deterministic detection.
; Without this, PlatformIO will auto-detect, which can be unreliable on Windows
; if multiple COM ports are present.
upload_port   = COM19
; monitor_port  = COM3

; ──────────────────────────────────────────────────────────────────────────────
; Optional: pin to your local ESP-IDF v6.0 install instead of PlatformIO's
; bundled IDF. Uncomment if exact version parity with esp-hosted-pi matters.
; ──────────────────────────────────────────────────────────────────────────────
; platform_packages =
;     framework-espidf @ symlink:///C/esp/v6.0/esp-idf


