; ─────────────────────────────────────────────────────────────────────────────
; esp-hosted-pi — Pi-side ESP32-C5 firmware (ESP-Hosted coprocessor)
; C5 wired to Pi 5 over SPI — appears as wlan0 on Linux (WiFi 6 adapter)
;
; This is Espressif's ESP-Hosted-FG firmware, adapted for the KlipperESPwifi
; hardware (SPI transport, BT disabled, C5 target, custom GPIO pinout).
;
; Build   : Ctrl+Alt+B  (PlatformIO: Build)
; Flash   : Ctrl+Alt+U  (PlatformIO: Upload)
;
; IMPORTANT — first build only:
;   The managed_components/ directory is already populated in this repo.
;   If you ever delete it, ESP-IDF's component manager will re-fetch them
;   automatically during the cmake configure step (requires internet access).
;
; After flashing, the C5 must be reset, then load the esp-hosted kernel driver
; on the Pi:  sudo insmod /lib/modules/.../spi-esp32.ko
; ─────────────────────────────────────────────────────────────────────────────

[platformio]
default_envs = esp32c5-hosted-pi
src_dir       = main

; ──────────────────────────────────────────────────────────────────────────────
; Primary environment — Seeed Studio XIAO ESP32-C5, SPI transport, BT disabled
; ──────────────────────────────────────────────────────────────────────────────
[env:esp32c5-hosted-pi]
platform  = espressif32
board     = seeed_xiao_esp32c5
framework = espidf

; ESP-Hosted source files live in main/ (referenced via src_dir in [platformio]).
; main/CMakeLists.txt handles common/ sources via COMPONENT_SRCS paths.

; Apply
; C5 overrides: 240MHz CPU, SPI transport, BT disabled, custom partitions.
board_build.sdkconfig_defaults =
    sdkconfig.defaults
    sdkconfig.defaults.esp32c5

; Custom partition table for C5 (OTA-enabled, 8MB flash)
; Referenced by CONFIG_PARTITION_TABLE_CUSTOM_FILENAME in sdkconfig.defaults.esp32c5
board_build.partitions = partitions.esp32c5.csv

monitor_speed = 115200

; Uncomment and set your COM port (the C5 connected to the Pi, not the STM32).
upload_port   = COM19
monitor_port  = COM19

; ──────────────────────────────────────────────────────────────────────────────
; Optional: pin to local ESP-IDF v6.0 for version parity with esp-bridge.
; ──────────────────────────────────────────────────────────────────────────────
; platform_packages =
;     framework-espidf @ symlink:///C/esp/v6.0/esp-idf
