; Klipper WiFi MCU - PlatformIO configuration
;
; Two firmware targets:
;   host_esp  - ESP32-C5 DevKit V2 attached to Pi5 via SPI (WiFi 6 AP + SPI slave)
;   mcu_esp   - ESP32-C5 attached to STM32 via UART (WiFi 6 STA + UART bridge)
;
; Build:
;   pio run -e host_esp    # build host firmware
;   pio run -e mcu_esp     # build MCU bridge firmware
;   pio run                # build both
;
; Flash:
;   pio run -e host_esp -t upload --upload-port /dev/ttyUSB0
;   pio run -e mcu_esp  -t upload --upload-port /dev/ttyUSB1
;
; Monitor:
;   pio device monitor -e host_esp -p /dev/ttyUSB0
;
; NOTE: ESP32-C5 support requires espressif32 >= 6.4.0
;   pio pkg update -g -p espressif32

[platformio]
default_envs = host_esp, mcu_esp

; ── Shared base ──────────────────────────────────────────────────────────────
[env]
platform    = espressif32 @ ^6.4.0
framework   = espidf
monitor_speed = 115200
monitor_filters = esp32_exception_decoder, colorize

; Extra include path for the shared protocol header
build_flags =
    -I ${PROJECT_DIR}/include
    -DKWM_LOG_LEVEL=3

; ── Host ESP32-C5 (Pi5-side, SPI slave + WiFi 6 AP + TCP server) ─────────────
; Board: compact ESP32-C5 module (DevKitM-1 / "Super Mini" style)
;   ESP32-C5-WROOM-1, 4 MB flash, 384 KB SRAM
;   29 GPIOs, FSPI pad ring: GPIO2(MISO) GPIO6(SCLK) GPIO7(MOSI) GPIO10(CS)
;   USB Serial/JTAG on GPIO13/14, UART0 debug on GPIO11/12
;
; If 'esp32-c5-devkitm-1' is not in your platform registry yet, try:
;   board = esp32c5-devkitm-1
; or update the platform:  pio pkg update -g -p espressif32
[env:host_esp]
board       = esp32-c5-devkitm-1
src_dir     = host_esp/src
board_build.sdkconfig_path = ${PROJECT_DIR}/host_esp/sdkconfig.defaults

; Explicitly declare 4 MB flash so esptool and the partition table are correct.
; Without this the linker/uploader may assume the board definition default.
board_upload.flash_size = 4MB
board_build.flash_size  = 4MB
board_build.flash_mode  = dio
board_build.flash_freq  = 80m
; Custom no-OTA partition table: single 3.75 MB app slot, maximises space
; for the WiFi stack (≈1.2 MB) + our firmware.
board_build.partitions  = host_esp/partitions_4mb.csv

build_flags =
    ${env.build_flags}
    -DKWM_HOST_FIRMWARE=1
    -DKWM_FIRMWARE_NAME=\"host_esp\"

upload_speed = 921600

; ── MCU ESP32-C5 (STM32-side, UART bridge + WiFi 6 STA + TCP client) ─────────
[env:mcu_esp]
board       = esp32-c5-devkitc-1
src_dir     = mcu_esp/src
board_build.sdkconfig_path = ${PROJECT_DIR}/mcu_esp/sdkconfig.defaults

build_flags =
    ${env.build_flags}
    -DKWM_MCU_FIRMWARE=1
    -DKWM_FIRMWARE_NAME=\"mcu_esp\"
    ; Set MCU ID at build time (0-7). Default 0; override per-board:
    ;   pio run -e mcu_esp --build-flags "-DKWM_MCU_ID=1"
    -DKWM_MCU_ID=0

upload_speed = 921600
