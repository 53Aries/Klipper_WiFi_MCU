# Pi-side TCP tuning for Klipper WiFi MCU connections
# Install: sudo cp sysctl-klipper.conf /etc/sysctl.d/99-klipper.conf
#          sudo sysctl --system

# Disable Nagle on all sockets — critical for Klipper's small frequent packets
net.ipv4.tcp_nodelay = 1

# Keep socket buffers small — reduces software-added latency on top of WiFi latency
net.core.rmem_default = 4096
net.core.wmem_default = 4096
