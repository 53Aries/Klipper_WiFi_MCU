interface=wlan0
driver=nl80211

# WiFi 6 on 5GHz
hw_mode=a
ieee80211ax=1
ieee80211ac=1
channel=36               # Clean 5GHz channel — change to 149 if 36 is congested

ssid=klipper-mcu-net
wpa=2
wpa_passphrase=CHANGE_ME
wpa_key_mgmt=WPA-PSK
rsn_pairwise=CCMP

# WiFi 6 beamforming
he_su_beamformer=1
he_su_beamformee=1
he_mu_beamformer=1

# Required for 5GHz — set to your country
country_code=US

# Hide SSID — no need to advertise to home network
ignore_broadcast_ssid=1
