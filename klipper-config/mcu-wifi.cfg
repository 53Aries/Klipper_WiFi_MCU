# Klipper config for WiFi MCU boards
# Include this in printer.cfg

# Toolhead MCU (extruder, hotend thermistor, part cooling fan)
[mcu toolhead]
serial: socket://192.168.42.11:23
restart_method: command

# Auxiliary MCU (chamber sensors, LEDs, enclosure control)
# [mcu aux]
# serial: socket://192.168.42.12:23
# restart_method: command

# ── Disconnect handling ────────────────────────────────────────────────────
# Klipper will emergency stop on MCU disconnect by default.
# This macro parks and pauses instead of stopping outright.
# Wire it up via [gcode_macro CANCEL_PRINT] or similar.

[gcode_macro _MCU_DISCONNECT_PAUSE]
description: Park head and pause on WiFi MCU disconnect rather than hard stop
gcode:
    {% if printer.pause_resume.is_paused %}
        M118 MCU disconnect — already paused
    {% else %}
        M118 MCU disconnect detected — parking
        PAUSE
    {% endif %}
