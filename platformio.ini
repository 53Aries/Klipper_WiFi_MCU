; Klipper WiFi MCU - PlatformIO configuration
;
; Two firmware targets:
;   host_esp  - ESP32-C5 compact board on Pi5 via SPI (WiFi 6 AP + SPI slave)
;   mcu_esp   - ESP32-C5 DevKitC-1 on STM32 via UART (WiFi 6 STA + UART bridge)
;
; ── PLATFORM SETUP (required before first build) ────────────────────────────
; ESP32-C5 requires IDF 5.1+ which is not in any stable espressif32 release.
; Install the pioarduino fork (tracks Espressif IDF 5.x releases):
;
;   Windows PowerShell:
;     pio pkg install -g -p "https://github.com/pioarduino/platform-espressif32/releases/download/55.03.38-1/platform-espressif32.zip"
;
;   Then run your first build – it will download IDF 5.5, RISC-V toolchain, etc.
;   (~700 MB, one-time download)
;
; ── BUILD ───────────────────────────────────────────────────────────────────
;   pio run -e host_esp          # build host firmware
;   pio run -e mcu_esp           # build MCU bridge firmware
;
; ── FLASH (plug ESP32-C5 via USB-JTAG port, bottom connector) ───────────────
;   pio run -e host_esp -t upload
;   pio run -e mcu_esp  -t upload
;
; ── MONITOR ─────────────────────────────────────────────────────────────────
;   pio device monitor -e host_esp

[platformio]
default_envs = host_esp, mcu_esp
; src/ is the unified source root; each env selects its subdirectory via
; build_src_filter (src_dir is a project-level setting, not per-env).
src_dir    = src
boards_dir = boards

; ── Shared base ──────────────────────────────────────────────────────────────
[env]
; pioarduino fork – IDF 5.5, RISC-V toolchain, ESP32-C5 support
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.38-1/platform-espressif32.zip
framework   = espidf
monitor_speed = 115200
monitor_filters = colorize

; Shared protocol header (include/kwm_protocol.h)
build_flags =
    -I ${PROJECT_DIR}/include
    -DKWM_LOG_LEVEL=3

; ── Host ESP32-C5 (Pi5-side, SPI slave + WiFi 6 AP + TCP server) ─────────────
; Board: compact ESP32-C5 module (WROOM-1 style, 4 MB flash, 384 KB SRAM)
;   SPI pins (GPIO matrix, avoids FSPI IO_MUX direction bug in slave mode):
;     GPIO23(MOSI) GPIO24(MISO) GPIO6(SCLK) GPIO10(CS)
;   DATA_READY: GPIO25 → Pi BCM25 (pin 22)
;   HANDSHAKE:  GPIO26 ← Pi BCM24 (pin 18)
;   USB Serial/JTAG on GPIO13/14 (bottom USB connector = flash/monitor port)
[env:host_esp]
board       = esp32c5-host
; Source selection is handled by src/CMakeLists.txt via $ENV{PIOENV}

; Correct key for per-environment sdkconfig (confirmed from espidf.py line 113)
board_build.esp-idf.sdkconfig_path = ${PROJECT_DIR}/host_esp/sdkconfig.defaults

; 4MB flash – must match physical module
board_upload.flash_size = 4MB
board_build.flash_size  = 4MB
board_build.flash_mode  = dio
board_build.flash_freq  = 80m

; Custom no-OTA partition table: single 3.75 MB app slot
board_build.partitions  = host_esp/partitions_4mb.csv

build_flags =
    ${env.build_flags}
    -DKWM_HOST_FIRMWARE=1
    -DKWM_FIRMWARE_NAME=\"host_esp\"

; USB-JTAG doesn't use baud rate – this value is ignored but required by PIO
upload_speed = 460800

; ── MCU ESP32-C5 (STM32-side, UART bridge + WiFi 6 STA + TCP client) ─────────
; Board: Seeed Studio XIAO ESP32C5 (compact, 4 MB flash)
;   UART1: GPIO11(TX/D6)→STM32 RX, GPIO12(RX/D7)←STM32 TX, 250000 baud
[env:mcu_esp]
board       = seeed-xiao-esp32c5

board_build.esp-idf.sdkconfig_path = ${PROJECT_DIR}/mcu_esp/sdkconfig.defaults

board_upload.flash_size = 8MB
board_build.flash_size  = 8MB
board_build.flash_mode  = qio
board_build.flash_freq  = 80m

build_flags =
    ${env.build_flags}
    -DKWM_MCU_FIRMWARE=1
    -DKWM_FIRMWARE_NAME=\"mcu_esp\"
    -DKWM_UART_TX_PIN=11
    -DKWM_UART_RX_PIN=12
    ; MCU ID is derived at runtime from the hardware MAC address.
    ; Same binary flashes onto every MCU-side board — no per-device config needed.

upload_speed = 460800
