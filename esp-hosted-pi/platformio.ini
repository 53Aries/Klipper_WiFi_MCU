; ─────────────────────────────────────────────────────────────────────────────
; esp-hosted-pi — Pi-side ESP32-C5 firmware (USB CDC-NCM WiFi 6 AP)
;
; The C5 presents as a USB Ethernet adapter (CDC-NCM) to the Pi via USB OTG.
; Linux sees it as usb0/eth1 — no custom kernel module needed.
; The C5 also runs a WiFi 6 softAP (OFDMA) for the MCU-side C5 boards.
;
; Transport:  Pi USB ←——USB HS——→ C5 USB OTG (TinyUSB CDC-NCM)
; WiFi:       C5 softAP 802.11ax, 5GHz, hidden SSID
;
; Build   : Ctrl+Alt+B  (PlatformIO: Build)
; Flash   : Ctrl+Alt+U  (PlatformIO: Upload, requires BOOT+RESET for first flash)
; ─────────────────────────────────────────────────────────────────────────────

[platformio]
default_envs = esp32c5-usb-ap
src_dir       = main

[env:esp32c5-usb-ap]
platform  = espressif32
board     = esp32c5_devkit_v2
framework = espidf

board_build.sdkconfig_defaults =
    sdkconfig.defaults
    sdkconfig.defaults.esp32c5

board_build.partitions = partitions.esp32c5.csv

monitor_speed = 115200
upload_port   = COM10
monitor_port  = COM10
